<!DOCTYPE html>
<html>

<head>
    <title>Phozi - Redirecting...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #0c0f14;
            --text: #f0f2f5;
            --accent: #0ea5e9;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }

        .btn {
            font-size: 1.1em;
            padding: 14px 28px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(14, 165, 233, 0.4);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');

            function buildPhoziUri() {
                const q = new URLSearchParams();
                if (code) q.set('code', code);
                if (state) q.set('state', state);
                return 'phozi://oauth2redirect' + (q.toString() ? ('?' + q.toString()) : '');
            }

            function tryOpenApp() {
                const target = buildPhoziUri();
                window.location.assign(target);
            }

            document.addEventListener('DOMContentLoaded', function () {
                const btn = document.getElementById('openBtn');
                if (btn) btn.onclick = tryOpenApp;

                // Auto attempt open
                setTimeout(() => {
                    tryOpenApp();
                }, 400);
            });
        })();
    </script>
</head>

<body>
    <h2 style="margin-bottom: 8px;">Redirecting to Phozi</h2>
    <p style="color: #8b92a0; margin-bottom: 32px;">Completing login... One moment please.</p>
    <button id="openBtn" class="btn">Open Phozi App</button>
</body>

</html>
