<!DOCTYPE html>
<html>

<head>
    <title>Phozi - Redirecting...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');

            function buildPhoziUri() {
                const q = new URLSearchParams();
                if (code) q.set('code', code);
                if (state) q.set('state', state);
                return 'phozi://oauth2redirect' + (q.toString() ? ('?' + q.toString()) : '');
            }

            function tryOpenApp() {
                const target = buildPhoziUri();
                window.location.assign(target);
            }

            document.addEventListener('DOMContentLoaded', function () {
                const btn = document.getElementById('openBtn');
                if (btn) btn.onclick = tryOpenApp;

                // Auto attempt open
                setTimeout(() => {
                    tryOpenApp();
                }, 400);
            });
        })();
    </script>
</head>

<body
    style="font-family: sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; background:#f0f7ff;">
    <h2 style="color: #1a237e;">Redirecting to Phozi</h2>
    <p>Completing login... If the app doesn't open, tap below:</p>
    <button id="openBtn"
        style="font-size:1.1em; padding:12px 24px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer;">Open
        Phozi App</button>
</body>

</html>
